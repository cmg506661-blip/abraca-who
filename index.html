<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>아브라카 후 온라인</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top right, #2b1055 0%, #7597de 100%); color: white; text-align: center; font-family: 'Jua', sans-serif; margin: 0; padding: 20px; min-height: 100vh; }
        h1 { font-size: 3em; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 255, 255, 0.5); margin-bottom: 10px; color: #f1c40f; }
        .board { margin: 15px auto; padding: 20px; width: 85%; border-radius: 20px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        #opponents-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .opponent-board { border-radius: 15px; width: 140px; padding: 15px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); transition: all 0.3s ease; }
        .active-turn { border: 2px solid #f1c40f !important; box-shadow: 0 0 20px rgba(241, 196, 15, 0.6) !important; transform: scale(1.05); }
        .card { display: inline-block; width: 90px; height: 130px; margin: 10px; border-radius: 15px; line-height: 130px; font-size: 20px; font-weight: bold; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); color: #333; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 2px solid #fff; }
        .my-card { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: transparent; border: 2px dashed rgba(255,255,255,0.7); }
        #result-text { font-size: 22px; color: #ffeaa7; margin-top: 20px; min-height: 80px; white-space: pre-line; line-height: 1.5; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; display: inline-block; min-width: 60%; }
        
        /* 🌟 비밀 메시지를 강조하는 스타일 */
        #private-msg { font-size: 22px; color: #00cec9; margin-top: 15px; min-height: 30px; white-space: pre-line; text-shadow: 1px 1px 3px #000; font-weight: bold; background: rgba(0, 0, 0, 0.5); padding: 10px; border-radius: 10px; display: inline-block; }
        
        #discard-area { display: none; margin: 20px auto; padding: 15px; width: 85%; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); }
        #discard-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
        .discard-badge { background: #e74c3c; padding: 10px 15px; border-radius: 8px; font-size: 18px; border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-weight: bold; color: white; }

        .hp-text { color: #ff7675; font-size: 16px; margin-right: 10px; text-shadow: 1px 1px 2px #000; }
        .stone-text { color: #a29bfe; font-size: 16px; text-shadow: 1px 1px 2px #000; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px; border-radius: 30px; border: none; font-family: 'Jua', sans-serif; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.2s ease; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }
        .btn:active { transform: scale(0.95); }
        #start-btn { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); font-size: 24px; padding: 20px 40px; }
        #duel-btn { background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); }
        #guess-btn { background: linear-gradient(135deg, #0575E6 0%, #021B79 100%); }
        #confirm-duel-btn, #confirm-guess-btn { background: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%); }
        
        #defense-area { display: none; margin-top: 20px; padding: 20px; background: rgba(231, 76, 60, 0.2); border-radius: 15px; border: 2px dashed #e74c3c; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }
        #accept-duel-btn { background: linear-gradient(135deg, #e67e22 0%, #d35400 100%); }
        #defense-guess-btn { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }

        select, input { padding: 12px; font-size: 18px; margin: 5px; border-radius: 10px; border: 2px solid #fff; background: rgba(255, 255, 255, 0.9); font-family: 'Jua', sans-serif; color: #333; outline: none; }
        
        #login-area { display: block; margin-top: 100px; }
        #join-btn { background: linear-gradient(135deg, #FF416C 0%, #FF4B2B 100%); font-size: 20px; }
        #nickname-input { width: 200px; text-align: center; font-size: 20px; padding: 15px; margin-bottom: 20px; }

        #lobby-area, #game-area, #action-area, #duel-area, #guess-area { display: none; }
    </style>
</head>
<body>

    <h1>✨ 아브라카 후 온라인 ✨</h1>

    <div id="login-area">
        <h2>당신의 마법사 이름을 알려주세요!</h2>
        <input type="text" id="nickname-input" placeholder="닉네임 (예: 간달프)" maxlength="10">
        <br>
        <button id="join-btn" class="btn">대기실 입장하기</button>
    </div>

    <div id="lobby-area">
        <h2>대기실 <span id="player-count">(0명 접속)</span></h2>
        <div id="lobby-players" style="font-size:20px; margin-bottom:20px;"></div>
        <button id="start-btn" class="btn">🚀 게임 시작! (모두 모이면 누르세요)</button>
    </div>

    <div id="game-area">
        <div id="opponents-area"></div>
        
        <div id="discard-area">
            <h3 style="color: #bdc3c7; margin: 0 0 10px 0;">📜 사용된 카드 목록</h3>
            <div id="discard-list">아직 사용된 카드가 없습니다.</div>
        </div>

        <div id="my-board" class="board">
            <h3 id="my-title">나의 마법 돌</h3>
            <div id="my-card" class="card my-card">?</div>
        </div>

        <div id="action-area">
            <button id="duel-btn" class="btn">⚔️ 상대방과 결투</button>
            <button id="guess-btn" class="btn">🤔 내 정체 추리</button>
        </div>

        <div id="duel-area">
            <select id="target-player"></select>
            <button id="confirm-duel-btn" class="btn">결투 신청!</button>
        </div>

        <div id="guess-area">
            <input type="number" id="guess-input" min="1" max="6" placeholder="1~6">
            <button id="confirm-guess-btn" class="btn">정답 확인!</button>
        </div>

        <div id="defense-area">
            <h3 style="color: #ff7675; margin-top: 0;">⚠️ 결투 신청을 받았습니다! 어떻게 대응하시겠습니까?</h3>
            <button id="accept-duel-btn" class="btn">⚔️ 결투 수락</button>
            <br><br>
            <input type="number" id="defense-guess-input" min="1" max="6" placeholder="1~6">
            <button id="defense-guess-btn" class="btn">🤔 추리로 반격</button>
        </div>

        <br>
        <div id="result-text">서버와 연결 중...</div>
        <div id="private-msg" style="display: none;"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let hasJoined = false; 

        const cardNames = {
            6: '👻고스트(6)', 5: '🧛뱀파이어(5)', 4: '⚔️갑옷기사(4)', 
            3: '🎩집사(3)', 2: '🍳요리사(2)', 1: '🧹청소부(1)'
        };

        document.getElementById('join-btn').addEventListener('click', () => {
            let nickname = document.getElementById('nickname-input').value.trim();
            if (!nickname) return alert("닉네임을 입력해주세요!");
            socket.emit('joinGame', nickname); 
        });

        socket.on('joinSuccess', () => {
            hasJoined = true;
            document.getElementById('login-area').style.display = "none";
        });

        socket.on('joinFail', (msg) => {
            alert(msg);
        });

        socket.on('lobbyUpdate', (players) => {
            if (!hasJoined) return; 
            document.getElementById('lobby-area').style.display = "block";
            document.getElementById('game-area').style.display = "none";
            document.getElementById('player-count').innerText = `(${players.length}명 접속)`;
            document.getElementById('lobby-players').innerHTML = players.map(p => `🧙‍♂️ ${p.name} (대기중)`).join('<br>');
        });

        socket.on('gameLog', (msg) => {
            let logArea = document.getElementById('result-text');
            logArea.innerHTML = msg + "<br><br>" + logArea.innerHTML;
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            // 🌟 게임 시작 시 내 이전 게임의 비밀 메시지를 청소합니다.
            document.getElementById('private-msg').innerHTML = "";
            document.getElementById('private-msg').style.display = "none";
            socket.emit('startGame');
        });

        socket.on('gameState', (data) => {
            if (!hasJoined) return; 

            // 🌟 이전 코드에 있던 "document.getElementById('private-msg').innerHTML = '';" 코드를 과감히 삭제했습니다! 
            // 이제 상태가 업데이트되어도 내가 확인한 비밀 카드는 지워지지 않습니다.

            document.getElementById('lobby-area').style.display = "none";
            document.getElementById('game-area').style.display = "block";
            
            let myId = socket.id;
            let players = data.players;
            let currentTurnPlayer = players[data.turnIndex];
            
            let isMyTurn = currentTurnPlayer && (currentTurnPlayer.id === myId) && !data.isOver && !data.pendingAttack;

            let myData = players.find(p => p.id === myId);

            document.getElementById('result-text').innerHTML = data.log.replace(/\n/g, '<br>');

            if (myData && myData.hp > 0) {
                document.getElementById('my-board').style.display = "block";
                document.getElementById('my-title').innerHTML = `${myData.name} <span class="hp-text">❤️ ${myData.hp}</span> <span class="stone-text">💎 ${myData.stone}</span>`;
            } else {
                document.getElementById('my-board').style.display = "none";
            }
            
            if (isMyTurn || data.pendingAttack === myId) document.getElementById('my-board').classList.add('active-turn');
            else document.getElementById('my-board').classList.remove('active-turn');

            const opponentsArea = document.getElementById('opponents-area');
            const targetPlayerSelect = document.getElementById('target-player');
            opponentsArea.innerHTML = "";
            targetPlayerSelect.innerHTML = "";

            players.forEach(p => {
                if (p.id !== myId && p.hp > 0) {
                    let oppDiv = document.createElement('div');
                    let isActiveOpponent = currentTurnPlayer && currentTurnPlayer.id === p.id && !data.isOver;
                    oppDiv.className = `opponent-board ${isActiveOpponent ? 'active-turn' : ''}`;
                    
                    if (data.pendingAttack === p.id) oppDiv.style.border = "3px dashed #e74c3c";
                    
                    oppDiv.innerHTML = `
                        <div style="margin-bottom: 5px;"><b>${p.name}</b></div>
                        <span class="hp-text">❤️ ${p.hp}</span> | <span class="stone-text">💎 ${p.stone}</span><br>
                        <div class="card" style="width:70px; height:100px; line-height:100px; font-size:16px;">${cardNames[p.card]}</div>
                    `;
                    opponentsArea.appendChild(oppDiv);

                    let option = document.createElement('option');
                    option.value = p.id;
                    option.text = p.name;
                    targetPlayerSelect.appendChild(option);
                }
            });

            document.getElementById('discard-area').style.display = "block";
            let discardHtml = "";
            if (data.discardPile && data.discardPile.length > 0) {
                let cardCounts = {};
                data.discardPile.forEach(num => {
                    cardCounts[num] = (cardCounts[num] || 0) + 1;
                });
                let sortedKeys = Object.keys(cardCounts).sort((a, b) => b - a);
                discardHtml = sortedKeys.map(num => `<div class="discard-badge">${cardNames[num]} ✖ ${cardCounts[num]}</div>`).join('');
            } else {
                discardHtml = "아직 사용된 카드가 없습니다.";
            }
            document.getElementById('discard-list').innerHTML = discardHtml;

            if (data.pendingAttack === myId && !data.isOver) {
                document.getElementById('action-area').style.display = "none";
                document.getElementById('defense-area').style.display = "block";
            } else {
                document.getElementById('defense-area').style.display = "none";
                document.getElementById('action-area').style.display = isMyTurn ? "block" : "none";
            }
            
            document.getElementById('duel-area').style.display = "none";
            document.getElementById('guess-area').style.display = "none";
        });

        // 🌟 서버로부터 비밀 메시지를 받으면 화면에 띄워줍니다.
        socket.on('privateLog', (msg) => {
            let privateMsgDiv = document.getElementById('private-msg');
            privateMsgDiv.innerHTML = msg;
            privateMsgDiv.style.display = "inline-block"; // 메시지가 있으면 보여줍니다.
        });

        // 🌟 사용자가 능동적으로 다음 액션(버튼 클릭)을 취할 때만 비밀 메시지를 청소합니다.
        document.getElementById('confirm-duel-btn').addEventListener('click', () => {
            let targetId = document.getElementById('target-player').value;
            if(!targetId) return alert("결투할 상대가 없습니다.");
            document.getElementById('private-msg').style.display = "none"; // 메시지 청소
            socket.emit('actionDuelRequest', targetId); 
        });

        document.getElementById('confirm-guess-btn').addEventListener('click', () => {
            let guess = parseInt(document.getElementById('guess-input').value);
            if(!guess) return alert("숫자를 입력하세요.");
            document.getElementById('private-msg').style.display = "none"; // 메시지 청소
            socket.emit('actionGuess', guess);
        });

        document.getElementById('accept-duel-btn').addEventListener('click', () => {
            document.getElementById('private-msg').style.display = "none"; // 메시지 청소
            socket.emit('respondToAttack', { type: 'duel' });
        });
        
        document.getElementById('defense-guess-btn').addEventListener('click', () => {
            let guess = parseInt(document.getElementById('defense-guess-input').value);
            if(!guess) return alert("반격할 숫자를 입력하세요.");
            document.getElementById('private-msg').style.display = "none"; // 메시지 청소
            socket.emit('respondToAttack', { type: 'guess', guessNum: guess });
        });

        // 단순 메뉴 이동 버튼들
        document.getElementById('duel-btn').addEventListener('click', () => {
            document.getElementById('action-area').style.display = "none"; 
            document.getElementById('duel-area').style.display = "block";
        });
        document.getElementById('guess-btn').addEventListener('click', () => {
            document.getElementById('action-area').style.display = "none"; 
            document.getElementById('guess-area').style.display = "block";
        });
    </script>
</body>
</html>
